# 
# Persistent Volume Claim 
#
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: todo-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

# 
# Database Deployment + Service
# 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-database
  template:
    metadata:
      labels:
        app: todo-database
    spec:
      containers:
      - name: database
        image: nurolla26/todo_database
        env:
        - name: POSTGRES_DB
          value: docker_app_db
        - name: POSTGRES_USER
          value: docker_app
        - name: POSTGRES_PASSWORD
          value: docker_app
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: todo-db-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: todo-database
spec:
  selector:
    app: todo-database
  ports:
    - port: 5432
      targetPort: 5432

---

# 
# Backend Deployment + Service
# 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
      - name: backend
        image: nurolla26/todo_backend
        env:
        - name: HOST
          value: todo-database
        - name: PORT
          value: "5432"
        - name: DB
          value: docker_app_db
        - name: DB_USERNAME
          value: docker_app
        - name: DB_PASSWORD
          value: docker_app
        ports:
        - containerPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: todo-backend
spec:
  selector:
    app: todo-backend
  ports:
    - port: 8000
      targetPort: 8000

---

# 
# Frontend (Nginx) Deployment + Service
# 
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    user www-data;
    worker_processes 2;

    events {
        worker_connections 2048;
    }

    http {
        map $uri $base {
            ~/(?<file>[^/]*)$ $file;
        }
        server {
            listen 80;
            server_name _;
            location /api {
                proxy_pass http://todo-backend:8000/api;
            }

            location / {
                root /nginx/static;
                try_files /$base /index.html =404;
            }
        }
        include /etc/nginx/sites-enabled/*.conf;
        include mime.types;
    }


---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
      - name: nginx
        image: nurolla26/todo_nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---

apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
spec:
  type: NodePort
  selector:
    app: todo-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
