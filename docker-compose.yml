services:
  database:
    image: 7_database
    environment:
      POSTGRES_DB: docker_app_db 
      POSTGRES_USER: docker_app 
      POSTGRES_PASSWORD: docker_app
    volumes:
      - todo_db:/var/lib/postgresql/data
    networks:
      - todo_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "docker_app"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    image: 7_back
    environment:
      HOST: database
      PORT: 5432
      DB: docker_app_db
      DB_USERNAME: docker_app
      DB_PASSWORD: docker_app
    networks:
      - todo_net
    healthcheck:
      test: ["CMD", "curl", "localhost:8000/test"]
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      database:
        condition: service_healthy
  
  frontend:
    image: 7_nginx
    ports:
      - 80:80
    networks:
      - todo_net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
    depends_on:
      database:
        condition: service_healthy
      backend:
        condition: service_healthy

networks:
  todo_net:

volumes:
  todo_db:



